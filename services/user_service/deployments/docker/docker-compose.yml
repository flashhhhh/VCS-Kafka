services:
  postgres:
    image: postgres:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345678
      POSTGRES_DB: user_db
    networks:
      - my_network
  
  redis:
    image: redis:latest
    networks:
      - my_network
  
  user_service:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    logging:
        driver: journald
        options:
            tag: mytag
    depends_on:
      - postgres
      - redis
    networks:
      - my_network

networks:
  my_network:
    driver: bridge